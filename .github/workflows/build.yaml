name: Build libmpv-android

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1'
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

env:
  NDK_VER: r26c

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3.3.0
      - name: Setup Java JDK
        uses: actions/setup-java@v3.9.0
        with:
          distribution: temurin
          java-version: 11
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "^1.x"
          check-latest: true
      - name: Display Go version
        run: go version
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v1
        with:
          channel: "stable"
      - name: Gradle Build Action
        uses: gradle/gradle-build-action@v2.3.3
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VER }}
          link-to-sdk: true
      - name: Symlink SDK
        working-directory: ./buildscripts
        run: |
          mkdir sdk
          ln -s ${ANDROID_HOME} ./sdk/android-sdk-linux
      - name: Bundle (default)
        working-directory: ./buildscripts
        run: |
          sudo chmod +x bundle_default.sh
          ./bundle_default.sh
        env:
           ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

#      - name: Bundle (full)
#        working-directory: ./buildscripts
#        run: |
#          sudo chmod +x bundle_full.sh
#          ./bundle_full.sh
#        env:
#           ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - id: set_tag_date
        run: echo "tag_date=$(date +'%Y%m%d')" >> $GITHUB_ENV
      - uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          draft: false
          prerelease: false
          tag_name: ${{ env.tag_date }}
          files: |
            output/*
